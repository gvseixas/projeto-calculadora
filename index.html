<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora - S.A</title>
    <link rel="stylesheet" href="tela_calculadora.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Calculadora - S.A</h1>
        <p>Fatorial e Exponenciação</p>
    </header>

    <div class="container">
        <div class="calc-section">
            <h2>Fatorial</h2>
            <input type="number" id="numFatorial" placeholder="Digite o número (ex: 5)">
            <br><br>
            <button id="btnFatorial">Calcular !</button>
            <p id="resultadoFatorial" class="resultado"></p>
        </div>

        <div class="calc-section">
            <h2>Exponenciação</h2>
            <input type="number" step="any" id="base" placeholder="Base (ex: 2)">
            <input type="number" step="any" id="expoente" placeholder="Expoente (ex: 3)">
            <br><br>
            <button id="btnExponenciacao">Calcular ^</button>
            <p id="resultadoExp" class="resultado"></p>
        </div>
    </div>
</body>
</html>
