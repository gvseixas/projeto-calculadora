<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora - Fatorial e Exponenciação</title>
    <link rel="stylesheet" href="tela_calculadora.css">
</head>
<body>
    <header>
        <h1>Calculadora - S.A</h1>
        <p>Fatorial e Exponenciação</p>
    </header>

    <div class="container">
        <div class="calc-section">
            <h2>Fatorial</h2>
            <input type="number" id="numFatorial" placeholder="Digite o número (ex: 5)">
            <br><br>
            <button onclick="calcularFatorial()">Calcular !</button>
            <p id="resultadoFatorial" class="resultado"></p>
        </div>

        <div class="calc-section">
            <h2>Exponenciação</h2>
            <input type="number" step="any" id="base" placeholder="Base (ex: 2)">
            <input type="number" step="any" id="expoente" placeholder="Expoente (ex: 3)">
            <br><br>
            <button onclick="calcularExponenciacao()">Calcular ^</button>
            <p id="resultadoExp" class="resultado"></p>
        </div>
    
        <div class="calc-section">
            <h2>Subtração</h2>
            <input type="number" step="any" id="subNum1" placeholder="Número 1">
            <input type="number" step="any" id="subNum2" placeholder="Número 2">
            <br><br>
            <button id="btnSubtracao">Calcular -</button>
            <p id="resultadoSub" class="resultado"></p>

    </div>

    <script>
        function fatorial(n) {
            if (n < 0) {
                return "Erro: Fatorial não definido para negativos!";
            }
            let resultado = 1;
            for (let i = 1; i <= n; i++) {
                resultado *= i;
            }
            return resultado;
        }

        function exponenciacao(base, expoente) {
            return base ** expoente;
        }

        function subtracao(n1, n2) {
            return n1 - n2;
    }

        function calcularFatorial() {
            let n = parseInt(document.getElementById('numFatorial').value);
            if (isNaN(n)) {
                document.getElementById('resultadoFatorial').textContent = 'Digite um número válido!';
                return;
            }
            document.getElementById('resultadoFatorial').textContent = `${n}! = ${fatorial(n)}`;
        }

        function calcularExponenciacao() {
            let base = parseFloat(document.getElementById('base').value);
            let expoente = parseFloat(document.getElementById('expoente').value);
            if (isNaN(base) || isNaN(expoente)) {
                document.getElementById('resultadoExp').textContent = 'Digite números válidos!';
                return;
            }
            document.getElementById('resultadoExp').textContent = `${base}^${expoente} = ${exponenciacao(base, expoente)}`;
        }

        function calcularSubtracao() {
        let n1 = parseFloat(document.getElementById('subNum1').value);
        let n2 = parseFloat(document.getElementById('subNum2').value);
        if (isNaN(n1) || isNaN(n2)) {
            document.getElementById('resultadoSub').textContent = 'Digite números válidos!';
            return;
        }
        document.getElementById('resultadoSub').textContent = `${n1} - ${n2} = ${subtracao(n1, n2)}`;
    }

    </script>
</body>
</html>
